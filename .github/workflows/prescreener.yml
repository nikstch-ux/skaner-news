name: Pre-screener — 10:15 AM ET daily

on:
  schedule:
    - cron: '15 14 * * 1-5'   # 10:15 AM EDT / 9:15 AM EST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prescreener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-prescreener-yfinance-pandas

      - name: Install dependencies
        run: pip install yfinance pandas numpy pytz -q

      - name: Run Pre-screener
        run: python prescreener_unified.py

      - name: Commit candidates.json
        run: |
          git config user.name "prescreener-bot"
          git config user.email "bot@github.com"
          git add -f candidates.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "candidates: $(date +%Y-%m-%d)"
          git push || true
